<html>
    <head>
        <title>Pico</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://d3js.org/d3.v7.min.js"></script>
        
        <style>

         .temp {
             color: steelblue;            
             text-align: center;
             font-size: 100px;        /* 32px, or use 1.5em, 24px, etc */
             font-weight: bold;      /* Optional: thicker text */
             padding: 20px;          /* Breathing room */
         }
         .active {
             color: tomato;
         }
        </style>
    </head>
    <body>
        <div class="container">
            <div id="value" class="temp"></div>
            <div id="desc"></div>

            <div class="border p-2 card mb-2">
                <table class="table align-middle table-hover" id="settings-table">
                    <thead>
                        <tr>
                            <th scope="col" class="text-center">from</th>
                            <th scope="col" class="text-center">to</th>
                            <th scope="col" class="text-center">°C</th>
                            <th scope="col" class="text-center"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr style="display:none" id="row-template">
                            <td onclick="selectRow(${idx})" class="text-center">${from}</td>
                            <td onclick="selectRow(${idx})" class="text-center">${to}</td>
                            <td onclick="selectRow(${idx})" class="text-center">${temp}</td>
                            <td class="text-center">
                                <button type="submit" class="btn btn-sm btn-outline-secondary" onclick="deleteRow(${idx})">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="border p-2 card mb-2">
                <div class="row mb-2 g-1">
                    <div class="col-md-4">
                        <label for="validationCustom01" class="form-label">interval from</label>
                        <select class="form-select" id="select-from" onchange="selectChange(this)"></select>
                    </div>
                    <div class="col-md-4">
                        <label for="validationCustom02" class="form-label">interval to</label>
                        <select class="form-select" id="select-to" onchange="selectChange(this)"></select>
                    </div>
                    <div class="col-md-4">
                        <label for="validationCustomUsername" class="form-label">temperature</label>
                        <div class="input-group">
                            <select class="form-select" id="select-temp"></select>                
                            <span class="input-group-text">°C</span>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col text-end">
                        <button id="add" type="button" class="btn btn-primary" onclick="settingAdd(this)">Add</button>
                    </div>
                </div>
                
            </div>
            

            <div class="mt-3">
                <button id="button" type="button" class="btn btn-primary btn-lg" onclick="onButton(this)"></button>
            </div>
        </div>
        
        

        

        
        <script>

         function formatTemplate(template, values) {
             return template.replace(/\$\{(\w+)\}/g, (match, key) => values[key] ?? match);
         }

         const formatLabel = (value) => {
             const hour = Math.floor(value / 6);
             const min = (value - hour * 6) * 10;
             const label = `${hour.toString().padStart(2, '0')}:${min.toString().padStart(2, '0')}`;
             return label;
         }

         const selectRow = (idx) => {
             const interval = setting.intervals[idx];

             const $from = document.getElementById('select-from');
             const $to = document.getElementById('select-to');
             const $temp = document.getElementById('select-temp');

             $from.value = interval.from;
             $to.value = interval.to;
             $temp.value = interval.temp;
         }

         function show(setting) {
             // clear table
             const table = document.getElementById('settings-table');
             while (table.rows.length > 2) {
                 table.deleteRow(-1);  // -1 = last row
             }
             
             const tbody = document.querySelector('#settings-table tbody');
             const rowTemplate = document.getElementById('row-template');
             for (let i=0; i<setting.intervals.length; i+=1) {             
                 const row = setting.intervals[i];
                 const html = formatTemplate(rowTemplate.innerHTML, {
                     from: formatLabel(row.from),
                     to: formatLabel(row.to),
                     temp: row.temp,
                     idx: i,                               
                 });
                 tbody.insertAdjacentHTML('beforeend', html);    
             }
         }

         let setting = {
             name: "default",
             base: 15,
             intervals: [
                 //{from: 39, to: 135, temp: 21},
                 {from: 0, to: 144, temp: 15},
             ],             
         };
         show(setting);

         const selectChange = (button) => {
             const $from = document.getElementById('select-from');
             const $to = document.getElementById('select-to');
             const $add = document.getElementById('add');

             const fromValue = parseInt($from.value);
             const toValue = parseInt($to.value);

             if (toValue <= fromValue) {
                 if (button == $from) {
                     $to.value = fromValue + 1;
                 } else {
                     $from.value = toValue - 1;
                 }
             }

             $add.disabled = !(parseInt($from.value) < parseInt($to.value));
         }

         const settingAdd = (button) => {
             const $from = document.getElementById('select-from');
             const $to = document.getElementById('select-to');
             const $temp = document.getElementById('select-temp');
             
             const newRow = {
                 from: parseInt($from.value),
                 to: parseInt($to.value),
                 temp: parseFloat($temp.value),
             };

             if (newRow.from >= newRow.to) {
                 return;
             }
             console.log(newRow);
             let intervals = setting.intervals;

             for (let i=0; i < intervals.length; i+=1) {             
                 let row = intervals[i];
                 if (row.from >= newRow.from && row.from < newRow.to) {
                     row.from = newRow.to;
                 }
                 if (row.to >= newRow.from && row.to <= newRow.to) {
                     row.to = newRow.from;
                 }
             }
             intervals = intervals.filter((row) => !(row.from >= newRow.from && row.to <= newRow.to));
             intervals = intervals.filter((row) => (row.to >= row.from));
             
             for (let i=0; i < intervals.length; i+=1) {             
                 let row = intervals[i];
                 if (row.from <= newRow.from && row.to >= newRow.to) {
                     if (row.to > newRow.to) {
                         intervals.push({
                             from: newRow.to,
                             to: row.to,
                             temp: row.temp,
                         });
                     }
                     row.to = newRow.from;
                 }
             };
             
             intervals.push(newRow);             
             setting.intervals = intervals.sort((a, b) => a.from - b.from);;
             
             show(setting);
         }
         
         document.addEventListener('DOMContentLoaded', async () => {
             const selectFrom = document.getElementById('select-from');
             const selectTo = document.getElementById('select-to');
             const selectTemp = document.getElementById('select-temp');

             for (i = 0; i<=144; i+=1) {
                 const hour = Math.floor(i / 6);
                 const min = (i - hour * 6) * 10;
                 const label = `${hour.toString().padStart(2, '0')}:${min.toString().padStart(2, '0')}`;

                 if (i > 0) {
                     selectTo.add(new Option(label, i));
                 }
                 if (i < 144) {
                     selectFrom.add(new Option(label, i));
                 }
             }
             for (i = 10; i<=30; i+=1) {
                 selectTemp.add(new Option(i, i)); 
             }
             selectFrom.value = 39;
             selectTo.value = 144;
             selectTemp.value = 21;
             
             getLast();
         });

         const onButton = (button) => {
             button.disabled = true;
             fetch('http://pico.lan/toggle');
             //.then(response => response.arrayBuffer())
             //.then(buffer => updateCurrent(buffer));
         }

         const parseReading = (dv, idx) => {
             const unix = dv.getUint32(idx, true);  
             const temp = dv.getUint16(idx + 4, true);
             const flags = dv.getUint8(idx + 6, true);
             const date = new Date(unix * 1000);
             return {
                 unix: unix,
                 date: date,
                 time: date.toTimeString().slice(0,8),                 
                 temp: temp / 16,
                 relay: flags > 0,
             };
         }

         const getLast = () => {
             fetch('http://pico.lan/last')
                 .then(response => response.arrayBuffer())
                 .then(buffer => {                     
                     updateCurrent(buffer);
                     setTimeout(getLast, 5000);
                 });                                 
         }

         const updateCurrent = (buffer) => {
             const dv = new DataView(buffer);
             const reading = parseReading(dv, 0);
             
             const value = document.getElementById('value');
             const button = document.getElementById('button');
             const desc = document.getElementById('desc');
             
             const time = reading.date.toTimeString().slice(0,8);            
             const text = reading.temp.toFixed(1) + "°C"
             
             desc.textContent = `${time} ${reading.temp}`;
             value.textContent = text;
             if (reading.relay) {
                 value.classList.add('active');
                 button.textContent = "GASI";
             } else {
                 value.classList.remove('active');
                 button.textContent = "PALI";                 
             }
             button.disabled = false;
         }

         const getAll = () => {
             fetch('http://pico.lan/all')
                 .then(response => response.arrayBuffer())
                 .then(buffer => {                     
                     const dv = new DataView(buffer);  
                     let readings = [];
                     for (idx = 0; idx + 7 <= dv.byteLength; idx += 7) {
                         readings.push(parseReading(dv, idx));
                     }
                     console.log(readings);                     
                 });
         }         
        </script>

        <div class="row">
            <p>pero</p>
            <svg id="chart" width="800" height="400"></svg>
        </div>


        <script>

         const data = [
             {
                 "from": 0,
                 "to": 42,
                 "temp": 15
             },
             {
                 "from": 42,
                 "to": 48,
                 "temp": 21
             },
             {
                 "from": 48,
                 "to": 102,
                 "temp": 18
             },
             {
                 "from": 102,
                 "to": 129,
                 "temp": 21
             },
             {
                 "from": 129,
                 "to": 130,
                 "temp": 29
             },
             {
                 "from": 130,
                 "to": 135,
                 "temp": 21
             },
             {
                 "from": 135,
                 "to": 144,
                 "temp": 15
             }
         ];

         

             // Declare the chart dimensions and margins.
             const width = 928;
             const height = 500;
             const marginTop = 20;
             const marginRight = 30;
             const marginBottom = 30;
             const marginLeft = 40;

         // Declare the x (horizontal position) scale.
         const x = d3.scaleBand()
                     .domain(data.map(d => d.from))
                     .range([0, width])
                     .padding(0.05);

         // Declare the y (vertical position) scale.
         const y = d3.scaleLinear([10, 30], [height - marginBottom, marginTop]);

             // Declare the line generator.
             const line = d3.line()
                            .x(d => x(d.date))
                            .y(d => y(d.close));

             // Create the SVG container.
             const svg = d3.create("svg")
                           .attr("width", width)
                           .attr("height", height)
                           .attr("viewBox", [0, 0, width, height])
                           .attr("style", "max-width: 100%; height: auto; height: intrinsic;");

             // Add the x-axis.
             svg.append("g")
                .attr("transform", `translate(0,${height - marginBottom})`)
                .call(d3.axisBottom(x).ticks(width / 80).tickSizeOuter(0));

             // Add the y-axis, remove the domain line, add grid lines and a label.
             svg.append("g")
                .attr("transform", `translate(${marginLeft},0)`)
                .call(d3.axisLeft(y).ticks(height / 40))
                .call(g => g.select(".domain").remove())
                .call(g => g.selectAll(".tick line").clone()
                            .attr("x2", width - marginLeft - marginRight)
                            .attr("stroke-opacity", 0.1))
                .call(g => g.append("text")
                            .attr("x", -marginLeft)
                            .attr("y", 10)
                            .attr("fill", "currentColor")
                            .attr("text-anchor", "start")
                            .text("↑ Daily close ($)"));

             // Append a path for the line.
             svg.append("path")
                .attr("fill", "none")
                .attr("stroke", "steelblue")
                .attr("stroke-width", 1.5)
                .attr("d", line(data));

            //return svg.node();


        </script>
        
    </body>
</html>
