     // Chart dimensions
     const margin = {top: 20, right: 30, bottom: 60, left: 60};
     const width = 800 - margin.left - margin.right;
        const height = 400 - margin.top - margin.bottom;

        // Scales
        const x = d3.scaleBand()
            .domain(data.map(d => d.time))
            .range([0, width])
            .padding(0.05);

        const y = d3.scaleLinear()
            .domain([10, 25])  // Adjust to your temp range
            .range([height, 0]);

        // SVG setup
        const svg = d3.select("#chart")
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

     // Bars
     svg.selectAll(".bar")
        .data(data)
        .enter().append("rect")
        .attr("class", "bar")
        .attr("x", d => x(d.time))
        .attr("width", x.bandwidth())
        .attr("y", d => y(d.temp))
        .attr("height", d => height - y(d.temp))
        .attr("fill", d => d.relay ? "red" : "steelblue")
        .append("title")  // Simple tooltip
        .text(d => `Temp: ${d.temp}°C\nRelay: ${d.relay ? 'ON' : 'OFF'}\nTime: ${d.time}`);

     // X axis
     svg.append("g")
        .attr("transform", `translate(0,${height})`)
        .call(d3.axisBottom(x).tickFormat((d, i) => i % 10 === 0 ? d.slice(0,5) : ""))
     
        .selectAll("text")
     // .style("text-anchor", "end")
            .attr("dx", "-1.5em")
            //.attr("dy", ".15em")
            .attr("transform", "rotate(-45)");

        // Y axis
        svg.append("g")
           .call(d3.axisLeft(y));
