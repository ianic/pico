<html>
    <head>
        <title>Pico</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">     
        <link rel="icon" type="image/png" href="thermoemeter.png">
        
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>        
        <script src="https://d3js.org/d3.v7.min.js"></script>
        
        <style>

         .temp {
             color: steelblue;            
             text-align: center;
             font-size: 100px;       /* 32px, or use 1.5em, 24px, etc */
             font-weight: bold;      /* Optional: thicker text */
             padding: 20px;          /* Breathing room */
         }
         .active {
             color: tomato;
         }

         
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary mb-4">
            <div class="container-fluid">
                <a class="navbar-brand" href="#" onclick="navigatePage('home'); return false;"> 
                    <img src="thermoemeter.png" alt="Logo" width="32" height="32" class="d-inline-block align-text-top">
                </a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a id="home-link" class="nav-link" href="#" onclick="navigatePage('home'); return false;">Home</a>
                        <a id="set-link"  class="nav-link" href="#" onclick="navigatePage('set'); return false;">Set Profile</a>
                        <a id="profiles-link" class="nav-link" href="#" onclick="navigatePage('profiles'); return false;">Profiles</a>
                    </div>
                </div>
            </div>
        </nav>

        <div id="home-container" class="container" style="display:block">
            <div id="value" class="temp"></div>
            <div id="desc"></div>
            <div class="mt-3">
                <button id="button" type="button" class="btn btn-primary btn-lg" onclick="onButton(this)"></button>
            </div>
            <div class="mt-4">
                <h5 id="home-profile-name" class="text-capitalize text-muted"></h5>
                <svg id="home-chart" width="100%" height="200"></svg>
            </div>
        </div>

        <div id="set-container" class="container" style="display:none">
            <div class="mb-4">
                <div class="btn-group w-100" role="group">
                    <input type="radio" class="btn-check" name="schedule-mode" id="mode-fixed" value="fixed" onchange="setModeChange('fixed')">
                    <label class="btn btn-outline-primary" for="mode-fixed">Fixed</label>
                    <input type="radio" class="btn-check" name="schedule-mode" id="mode-workday-weekend" value="workday-weekend" onchange="setModeChange('workday-weekend')">
                    <label class="btn btn-outline-primary" for="mode-workday-weekend">Workday / Weekend</label>
                    <input type="radio" class="btn-check" name="schedule-mode" id="mode-daily" value="daily" onchange="setModeChange('daily')">
                    <label class="btn btn-outline-primary" for="mode-daily">Daily</label>
                </div>
            </div>

            <div id="set-fixed" class="schedule-panel">
                <div class="input-group mb-3">
                    <span class="input-group-text" style="min-width:110px">Profile</span>
                    <select class="form-select" id="set-fixed-profile" onchange="schedule.fixed = parseInt(this.value)"></select>
                </div>
            </div>

            <div id="set-workday-weekend" class="schedule-panel" style="display:none">
                <div class="input-group mb-3">
                    <span class="input-group-text" style="min-width:110px">Workday</span>
                    <select class="form-select" id="set-workday-profile" onchange="schedule.workday = parseInt(this.value)"></select>
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text" style="min-width:110px">Weekend</span>
                    <select class="form-select" id="set-weekend-profile" onchange="schedule.weekend = parseInt(this.value)"></select>
                </div>
            </div>

            <div id="set-daily" class="schedule-panel" style="display:none">
                <div class="input-group mb-3">
                    <span class="input-group-text" style="min-width:110px">Monday</span>
                    <select class="form-select" id="set-daily-mon" onchange="schedule.daily[0] = parseInt(this.value)"></select>
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text" style="min-width:110px">Tuesday</span>
                    <select class="form-select" id="set-daily-tue" onchange="schedule.daily[1] = parseInt(this.value)"></select>
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text" style="min-width:110px">Wednesday</span>
                    <select class="form-select" id="set-daily-wed" onchange="schedule.daily[2] = parseInt(this.value)"></select>
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text" style="min-width:110px">Thursday</span>
                    <select class="form-select" id="set-daily-thu" onchange="schedule.daily[3] = parseInt(this.value)"></select>
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text" style="min-width:110px">Friday</span>
                    <select class="form-select" id="set-daily-fri" onchange="schedule.daily[4] = parseInt(this.value)"></select>
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text" style="min-width:110px">Saturday</span>
                    <select class="form-select" id="set-daily-sat" onchange="schedule.daily[5] = parseInt(this.value)"></select>
                </div>
                <div class="input-group mb-3">
                    <span class="input-group-text" style="min-width:110px">Sunday</span>
                    <select class="form-select" id="set-daily-sun" onchange="schedule.daily[6] = parseInt(this.value)"></select>
                </div>
            </div>
        </div>
        <div id="profiles-container" class="container" style="display:none">
            profiles
        </div>
        
        <div id="edit-container" class="container" style="display:none">
            <div class="mb-4">
                <svg id="chart" width="100%" height="200"></svg>
            </div>
            
              <div class="input-group mb-3">
                  <span class="input-group-text">Profile</span>
                  <input type="text" class="form-control" placeholder="..." id="profile-name" oninput="editUpdateDirty()">
              </div>

              
            <div class="border p-2 card mb-2">
                <p>Target temperature interval
                    
                </p>
                <div class="row mb-2 g-1">
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text" style="min-width: 65px;">From</span>
                            <select class="form-select" id="select-from" onchange="selectChange(this)"></select>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text" style="min-width: 65px;">To</span>
                            <select class="form-select" id="select-to" onchange="selectChange(this)"></select>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text">Temperature</span>
                            <select class="form-select" id="select-temp"></select>                
                            <span class="input-group-text">°C</span>
                        </div>
                    </div>
                </div>
                <div class="row mb-2">
                    <div class="col text-end">
                        <button id="add" type="button" class="btn btn-primary" onclick="intervalAdd(this)">Add</button>
                    </div>
                </div>
                <small class="text-muted">Click on the graph above or on the tabel below to edit existing interval.</small>
            </div>

            <div class="d-flex gap-2 mb-3">
                <button type="button" class="btn btn-secondary" onclick="editBack()">Back</button>
                <button type="button" class="btn btn-primary" id="edit-update" onclick="editUpdate()" disabled>Update</button>
            </div>

            <div class="border p-2 card mb-2">
                <table class="table align-middle table-hover" id="intervals-table">
                    <thead>
                        <tr>
                            <th scope="col" class="text-center">From</th>
                            <th scope="col" class="text-center">To</th>
                            <th scope="col" class="text-center">°C</th>
                            <th scope="col" class="text-center"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr style="display:none" id="row-template">
                            <td onclick="selectRow(${idx})" class="text-center">${from}</td>
                            <td onclick="selectRow(${idx})" class="text-center">${to}</td>
                            <td onclick="selectRow(${idx})" class="text-center">${temp}</td>
                            <td class="text-center">
                                <button type="submit" class="btn btn-sm btn-outline-secondary" onclick="deleteRow(${idx})">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
                        
        </div>
        

        <script src="index.js"></script>
    </body>
</html>
